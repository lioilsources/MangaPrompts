category: effects
label: "Efekty"
icon: auto_awesome
required: false
# Ink/manga drawing effects are tagged `manga_fx`; the engine drops them when
# the medium is photoreal so they can't fight a photograph. No more camera
# incompatibility matrices.
blocks:
  - id: effects_manga_speed_lines
    label: "Manga speed lines"
    tags: [manga, speed_lines, motion, manga_fx]
    value: "dramatic manga speed lines, radial motion lines, action emphasis"
    mood: [dark, technical]
    incompatible: [effects_cherry_blossom]

  - id: effects_sparkle
    label: "Třpytivé efekty"
    tags: [sparkle, shimmer, magical]
    value: "sparkling shimmer effects, magical particle highlights, glittering accents"
    mood: [sweet, surreal]
    incompatible: [effects_glitch_art]

  - id: effects_glitch_art
    label: "Glitch art"
    tags: [glitch, digital, distortion]
    value: "glitch art distortion, digital corruption effect, scan-line artifacts, pixel displacement"
    mood: [surreal, dark]
    incompatible: [effects_sparkle, effects_cherry_blossom]

  - id: effects_holographic
    label: "Holografické odrazy"
    tags: [holographic, reflections, iridescent]
    value: "holographic reflections, iridescent light effects, prismatic color shifts"
    mood: [surreal, technical]
    incompatible: []

  - id: effects_cherry_blossom
    label: "Třešňové květy"
    tags: [cherry_blossom, petals, romantic]
    value: "cherry blossom petals falling, sakura petals floating in the air"
    mood: [sweet, nostalgic]
    incompatible: [effects_manga_speed_lines, effects_glitch_art]

  - id: effects_screentones
    label: "Screentóny"
    tags: [screentones, manga, halftone, manga_fx]
    value: "manga screentone overlay, halftone dot pattern, traditional manga print effect"
    mood: [nostalgic, technical]
    incompatible: []

  - id: effects_sweat_drop
    label: "Kapka potu (anime)"
    tags: [sweat_drop, comedy, anime, manga_fx]
    value: "anime sweat-drop effect, comical stress indicator, cartoon emphasis"
    mood: [sweet]
    incompatible: [effects_glitch_art]

  - id: effects_motion_lines
    label: "Pohybové čáry"
    tags: [motion_lines, movement, dynamic, manga_fx]
