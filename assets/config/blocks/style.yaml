category: style
label: "Styl / Nálada"
icon: brush
required: false
# Style is now a pure genre/mood flavour layered on top of any medium.
# No render-medium words, no camera incompatibility matrices — those moved to
# the `medium` axis and engine-level gating.
blocks:
  - id: style_shonen_action
    label: "Shonen akce"
    tags: [shonen, action]
    value: "dynamic shonen action mood, dramatic high-energy composition, intense atmosphere"
    mood: [dark, technical]
    incompatible: []

  - id: style_shojo_romantic
    label: "Shojo romantický"
    tags: [shojo, romantic]
    value: "soft romantic shojo mood, dreamy tender atmosphere, gentle delicate feel"
    mood: [sweet, nostalgic]
    incompatible: []

  - id: style_seinen
    label: "Seinen (vážný)"
    tags: [seinen, mature]
    value: "mature seinen tone, grounded serious atmosphere, detailed restrained composition"
    mood: [dark, technical, nostalgic]
    incompatible: []

  - id: style_slice_of_life
    label: "Slice of life"
    tags: [slice_of_life, casual]
    value: "warm slice-of-life mood, casual everyday atmosphere, candid relaxed feel"
    mood: [sweet, nostalgic]
    incompatible: []

  - id: style_cyberpunk
    label: "Cyberpunk"
    tags: [cyberpunk, neon]
    value: "cyberpunk aesthetic, neon-soaked dystopian mood, high-tech night atmosphere"
    mood: [dark, surreal]
    incompatible: [style_minimalist, style_slice_of_life]

  - id: style_noir_dramatic
    label: "Noir / dramatický"
    tags: [noir, dramatic]
    value: "dramatic noir mood, high-contrast chiaroscuro, cinematic tension"
    mood: [dark]
    incompatible: [style_chibi]

  - id: style_magical_girl
    label: "Kouzelná dívka"
    tags: [magical_girl, sparkle]
    value: "magical-girl theme, sparkle and ribbon motifs, luminous whimsical energy"
    mood: [sweet, surreal]
    incompatible: [style_noir_dramatic, style_seinen]

  - id: style_fantasy
    label: "Fantasy"
    tags: [fantasy, ethereal]
    value: "fantasy theme, ethereal otherworldly atmosphere, mythical mood"
    mood: [sweet, dark, surreal]
    incompatible: []

  - id: style_minimalist
    label: "Minimalistický"
    tags: [minimalist, clean]
    value: "minimalist composition, clean negative space, restrained elegant aesthetic"
    mood: [sweet, technical]
    incompatible: [style_cyberpunk, style_shonen_action]

  - id: style_chibi
    label: "Chibi komedie"
    tags: [chibi, comedy]
    value: "chibi comedy mood, exaggerated cute proportions, playful comical energy"
    mood: [sweet]
    incompatible: [style_noir_dramatic, style_seinen]
