category: medium
label: "Médium / Render"
icon: brush
required: true
# Master render axis. This is the ONLY place the photo-vs-illustration medium is
# declared — every other block stays medium-agnostic so nothing contradicts it.
# Front-loaded by the engine because FLUX/T5 weights early tokens most heavily.
blocks:
  - id: medium_photoreal
    label: "Fotorealistická fotka"
    tags: [photoreal, photo]
    value: "a photorealistic photograph, true-to-life detail, natural skin texture, realistic lighting and depth of field"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: [medium_anime, medium_manga, medium_comic]

  - id: medium_anime
    label: "Anime ilustrace"
    tags: [anime, illustration, drawn]
    value: "an anime-style illustration, clean cel-shaded linework, vibrant flat colors, expressive anime features"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: [medium_photoreal, medium_manga, medium_comic]

  - id: medium_manga
    label: "Manga (čб ilustrace)"
    tags: [manga, illustration, drawn, monochrome]
    value: "a black-and-white manga illustration, bold ink linework, screentone shading, dynamic manga aesthetic"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: [medium_photoreal, medium_anime, medium_comic]

  - id: medium_comic
    label: "Komiks (western ilustrace)"
    tags: [comic, illustration, drawn]
    value: "a western comic-book illustration, bold inked outlines, flat cel shading, halftone dot shading"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: [medium_photoreal, medium_anime, medium_manga]
