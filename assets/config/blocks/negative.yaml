category: negative
label: "Negativní prompt"
icon: block
required: false
# Negatives are passed as a separate API field. Medium-specific guards are tagged
# so the engine can drop the one that would fight the chosen medium (e.g. the
# "no anime drawing" guard is photo_only and is dropped for illustration media).
blocks:
  - id: negative_quality
    label: "Kvalita – negativní"
    tags: [quality, artifacts, blur]
    value: "low quality, blurry, jpeg artifacts, watermark, text overlay, cropped"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: []

  - id: negative_anatomy
    label: "Anatomie – negativní"
    tags: [anatomy, deformed, extra]
    value: "deformed anatomy, extra fingers, extra limbs, distorted face, bad proportions"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: []

  - id: negative_photo_guard
    label: "Foto guard (drž fotorealismus)"
    tags: [style, photo_only]
    value: "anime, cartoon, illustration, drawing, cel shading, flat shading, vector art, 3d render, cgi"
    mood: [sweet, dark, technical, nostalgic]
    incompatible: []

  - id: negative_illustration_guard
    label: "Ilustrace guard (drž kresbu)"
    tags: [style, illustration_only]
    value: "photograph, photorealistic, real photo, dslr, film grain, skin pores"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: []
