category: pose
label: "Póza / Gesto"
icon: accessibility_new
required: false
# Poses describe ONLY body gesture/posture — never framing ("full body shot",
# "close up"...). Framing lives in its own axis, so it can no longer be
# duplicated or contradicted here.
blocks:
  - id: pose_standing_neutral
    label: "Stojí (neutrálně)"
    tags: [standing, neutral]
    value: "standing in a relaxed natural stance"
    mood: [sweet, dark, surreal, technical, nostalgic]
    incompatible: []

  - id: pose_dynamic_action
    label: "Dynamická akce"
    tags: [action, dynamic]
    value: "dynamic action pose, mid-motion, powerful body language"
    mood: [dark, technical]
    incompatible: [pose_reclining, pose_sitting, pose_intimate]

  - id: pose_combat_ready
    label: "Bojová pohotovost"
    tags: [combat, martial]
    value: "combat-ready stance, braced and tense, martial readiness"
    mood: [dark, technical]
    incompatible: [pose_reclining, pose_intimate]

  - id: pose_walking
    label: "Jde (mid-stride)"
    tags: [walking, movement]
    value: "walking forward naturally, captured mid-stride"
    mood: [sweet, nostalgic, technical]
    incompatible: [pose_sitting, pose_kneeling, pose_reclining]

  - id: pose_sitting
    label: "Sedí"
    tags: [sitting, seated]
    value: "seated, relaxed sitting posture"
    mood: [sweet, dark, nostalgic, technical]
    incompatible: [pose_dynamic_action, pose_combat_ready, pose_walking]

  - id: pose_kneeling
    label: "Klečí"
    tags: [kneeling]
    value: "kneeling on the floor, grounded posture"
    mood: [sweet, dark, nostalgic]
    incompatible: [pose_dynamic_action, pose_walking]

  - id: pose_reclining
    label: "Leží / opírá se"
    tags: [reclining, lying]
    value: "reclining, lying back in a relaxed position"
    mood: [sweet, dark, nostalgic]
    incompatible: [pose_dynamic_action, pose_combat_ready, pose_walking]

  - id: pose_elegant
    label: "Elegantní postoj"
    tags: [elegant, graceful]
    value: "elegant graceful posture, composed poised body language"
    mood: [sweet, dark, nostalgic]
    incompatible: []

  - id: pose_intimate
    label: "Intimní blízkost"
    tags: [intimate, tender]
    value: "intimate close posture, gentle tender body language"
    mood: [sweet, dark, nostalgic]
    incompatible: [pose_dynamic_action, pose_combat_ready]

  - id: pose_magical_transform
    label: "Transformace (mág. dívka)"
    tags: [magical_girl, transformation]
    value: "magical-girl transformation pose, outstretched arms, radiating energy"
